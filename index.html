<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Huzme - Pearl Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Zeyada&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        canvas { background: #fff; border: 1px solid #333; width: 1000px; height: 600px; cursor: crosshair; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 1000 * dpr; canvas.height = 600 * dpr;
    ctx.scale(dpr, dpr);

    // --- РЕСУРСЫ ---
    const assets = {
        intro: new Image(), roomRenkli: new Image(), roomSiyah: new Image(),
        kelebek: new Image(), hero: new Image()
    };
    assets.intro.src = 'images/giris.png';
    assets.roomRenkli.src = 'images/renkli.png';
    assets.roomSiyah.src = 'images/siyah.png';
    assets.kelebek.src = 'images/kelebek.png';
    assets.hero.src = 'images/hero.png';

    const sounds = {
        click: new Audio('sounds/button-click-high-short-close.mp3'),
        transform: new Audio('sounds/magic-spells-with-harp-and-chimes_gjimere_.mp3'),
        bg: new Audio('sounds/the-sound-of-the-harp.mp3')
    };
    sounds.bg.loop = true;

    // --- СИСТЕМА АКТов ---
    let currentAct = 0;
    const acts = [
        {   // Акт 1: Книга
            target: "yasamak sakaya gelmez",
            full: "Yaşamak şakaya gelmez Büyük bir ciddiyetle yaşayacaksın",
            author: "Nazım Hikmet",
            obj: {x:205, y:302, w:67, h:38},
            dialogue: "-Düşüncelerim karmakarışık... Nereden başlamalıyım?",
            colorArea: {x:0, y:300, w:288, h:300}
        },
        {   // Акт 2: Картина
            target: "sevelim sevilelim",
            full: "Sevelim sevilelim, Dünya kimseye kalmaz",
            author: "Yunus Emre",
            obj: {x:350, y:150, w:80, h:60},
            dialogue: "-Bu tablo... Ailem. Onların sevgisi benim köklerim.",
            colorArea: {x:300, y:100, w:200, h:150}
        },
        {   // Акт 3: Телефон
            target: "sizi cok seviyorum",
            full: "Sizi çok seviyorum",
            author: "",
            obj: {x:500, y:400, w:50, h:50},
            dialogue: "-Sesinizi duymaya ihtiyacım var.",
            colorArea: {x:450, y:350, w:150, h:150}
        }
    ];

    // --- СОСТОЯНИЕ ---
    let gameState = "MENU", puzzleActive = false, puzzleCompleted = false;
    let kelebek = { x: 390, y: 143, speed: 5 }, mouse = { x: 0, y: 0 }, keys = {};
    let letters = [], lassoPoints = [], isDrawing = false;
    let collectedText = "", lassoInk = 100, timeLeft = 180, textAlpha = 0;
    let illuminatedAreas = [];

    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = 1000 * dpr; tempCanvas.height = 600 * dpr;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.scale(dpr, dpr);

    // --- ЛОГИКА ПАЗЛА ---
    function generateLetters() {
        letters = [];
        const pool = acts[currentAct].target.replace(/\s/g, '') + "abcde";
        const cols = 5, rows = 4;
        for (let i = 0; i < cols; i++) {
            for (let j = 0; j < rows; j++) {
                letters.push({
                    x: 740 + (i * 45), y: 300 + (j * 35),
                    char: pool[Math.floor(Math.random() * pool.length)],
                    isFound: false
                });
            }
        }
    }

    function isPointInLasso(x, y, points) {
        let inside = false;
        for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
            if (((points[i].y > y) !== (points[j].y > y)) && (x < (points[j].x - points[i].x) * (y - points[i].y) / (points[j].y - points[i].y) + points[i].x)) inside = !inside;
        }
        return inside;
    }

    // --- ОБРАБОТКА СОБЫТИЙ ---
    window.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === 'Enter') {
            if (gameState === "MENU") { gameState = "ROOM"; sounds.bg.play(); }
            else if (isAtTarget() && !puzzleActive) { puzzleActive = true; generateLetters(); }
        }
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    canvas.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
        if (isDrawing && lassoInk > 0) {
            lassoPoints.push({x: mouse.x, y: mouse.y});
            lassoInk -= 0.5;
        }
    });
    canvas.addEventListener('mousedown', () => {
        if (puzzleActive && !puzzleCompleted) { isDrawing = true; lassoPoints = []; lassoInk = 100; }
    });
    window.addEventListener('mouseup', () => {
        if (isDrawing) {
            isDrawing = false;
            letters.forEach(l => {
                if (!l.isFound && isPointInLasso(l.x, l.y, lassoPoints)) {
                    let needed = acts[currentAct].target.replace(/\s/g, '')[collectedText.length];
                    if (l.char === needed) {
                        l.isFound = true; collectedText += l.char;
                        sounds.click.play();
                        if (collectedText === acts[currentAct].target.replace(/\s/g, '')) completeAct();
                    }
                }
            });
        }
    });

    function isAtTarget() {
        const o = acts[currentAct].obj;
        return kelebek.x > o.x && kelebek.x < o.x + o.w && kelebek.y > o.y && kelebek.y < o.y + o.h;
    }

    function completeAct() {
        sounds.transform.play();
        illuminatedAreas.push(acts[currentAct].colorArea);
        puzzleActive = false; puzzleCompleted = true;
        setTimeout(() => {
            if (currentAct < acts.length - 1) {
                currentAct++; collectedText = ""; puzzleCompleted = false; textAlpha = 0;
            } else { gameState = "WIN"; }
        }, 4000);
    }

    // --- ЦИКЛ ОТРИСОВКИ ---
    function mainLoop() {
        ctx.clearRect(0, 0, 1000, 600);
        if (gameState === "MENU") drawMenu();
        else drawRoom();
        requestAnimationFrame(mainLoop);
    }

    function drawMenu() {
        ctx.drawImage(assets.intro, 0, 0, 1000, 600);
        ctx.fillStyle = "black"; ctx.font = "60px 'Zeyada'"; ctx.textAlign = "center";
        ctx.fillText("HUZME", 500, 80);
        ctx.fillStyle = (mouse.x > 405 && mouse.x < 595 && mouse.y > 300 && mouse.y < 348) ? "#B2D8B2" : "#D3D3D3";
        drawRoundedRect(ctx, 405, 300, 190, 48, 15); ctx.fill();
        ctx.fillStyle = "black"; ctx.font = "30px 'Zeyada'"; ctx.fillText("BAŞLA", 500, 335);
    }

    function drawRoom() {
        ctx.drawImage(assets.roomRenkli, 0, 0, 1000, 600);
        tempCtx.clearRect(0, 0, 1000, 600);
        tempCtx.drawImage(assets.roomSiyah, 0, 0, 1000, 600);
        tempCtx.globalCompositeOperation = 'destination-out';
        
        if (!puzzleCompleted) {
            tempCtx.beginPath(); tempCtx.arc(kelebek.x, kelebek.y, 80, 0, Math.PI*2); tempCtx.fill();
            updateKelebek();
        }
        illuminatedAreas.forEach(a => tempCtx.fillRect(a.x, a.y, a.w, a.h));
        
        tempCtx.globalCompositeOperation = 'source-over';
        ctx.drawImage(tempCanvas, 0, 0, 1000, 600);

        if (puzzleCompleted) ctx.drawImage(assets.hero, 150, 240, 350, 350);
        else ctx.drawImage(assets.kelebek, kelebek.x - 185, kelebek.y - 178, 400, 400);

        drawDialogue();
        drawPuzzle();
    }

    function updateKelebek() {
        if (keys['w'] && kelebek.y > 30) kelebek.y -= kelebek.speed;
        if (keys['s'] && kelebek.y < 480) kelebek.y += kelebek.speed;
        if (keys['a'] && kelebek.x > 20) kelebek.x -= kelebek.speed;
        if (keys['d'] && kelebek.x < 620) kelebek.x += kelebek.speed;
    }

    function drawDialogue() {
        ctx.save();
        ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; ctx.fillRect(0, 550, 670, 100);
        if (textAlpha < 1) textAlpha += 0.01;
        ctx.globalAlpha = textAlpha; ctx.fillStyle = "black"; ctx.font = "22px 'Zeyada'";
        ctx.textAlign = "left"; ctx.fillText(acts[currentAct].dialogue, 20, 580);
        ctx.restore();
    }

    function drawPuzzle() {
        if (!puzzleActive) return;
        ctx.save();
        // Тетрадка и Фраза
        ctx.font = "24px 'Zeyada'"; ctx.fillStyle = "black"; ctx.textAlign = "center";
        let disp = "";
        const target = acts[currentAct].target;
        for(let i=0; i<target.length; i++) {
            if (target[i] === " ") disp += "  ";
            else disp += (collectedText[i] || "_") + " ";
        }
        ctx.fillText(disp, 840, 100);
        ctx.font = "16px 'Zeyada'"; ctx.fillText(acts[currentAct].secondLine, 840, 130);
        
        // Буквы и Лассо
        letters.forEach(l => { if (!l.isFound) ctx.fillText(l.char, l.x, l.y); });
        if (isDrawing && lassoPoints.length > 2) {
            ctx.beginPath(); ctx.strokeStyle = "rgba(41, 128, 185, 0.7)"; ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]); ctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
            lassoPoints.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
        }
        
        // Индикатор чернил
        ctx.fillStyle = "red"; ctx.fillRect(733, 420, (lassoInk/100)*100, 5);
        ctx.restore();
    }

    function drawRoundedRect(c, x, y, w, h, r) {
        c.beginPath(); c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y, x+w, y+r);
        c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h); c.lineTo(x+r, y+h);
        c.quadraticCurveTo(x, y+h, x, y+h-r); c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y); c.closePath();
    }

    mainLoop();
</script>
</body>
</html>
